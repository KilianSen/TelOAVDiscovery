[agent]
  interval = "10ms"
  flush_interval = "10ms"

[[inputs.opcua]]
  endpoint = "opc.tcp://192.168.1.9:4840/freeopcua/server/"
  nodes = [
    { name = "V1", namespace = "2", identifier_type = "i", identifier = "1" },
    { name = "V2", namespace = "2", identifier_type = "i", identifier = "2" }
    ]

# Dummy influx output
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "test"
  bucket = "test"
